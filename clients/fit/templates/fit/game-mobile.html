{% extends "base.html" %}

{% block title %}
Fit (touch)
{% endblock %}

{% block body_class %}fit-touch-game{% endblock %}

{% block link %}
    <link rel="icon" type="image/png" href="{{ url_for('fit.static', filename='img/fit-icon.svg') }}">
    <link rel="stylesheet" href="{{ url_for('fit.static', filename='style/fit.css') }}">
    <link rel="stylesheet" href="{{ url_for('fit.static', filename='style/fit-mobile.css') }}">
{% endblock %}

{% block content %}
<div class="game-container fit-mobile-game">
<main class="board-area">
    <div class="board-wrapper">
    <div class="board-zoom-container" id="board-zoom-container">
        <div class="board-scale-indicator" id="board-scale-indicator" aria-hidden="true">1×</div>
        <div class="board-transform" id="board-transform">
        <div class="board" id="board">
            <div class="board-grid-wrapper" id="board-grid-wrapper">
            <svg class="board-grid" id="board-grid" width="10000" height="10000" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <defs>
                    <pattern id="grid-pattern" width="56" height="56" patternUnits="userSpaceOnUse">
                        <path d="M 16 0 v 56 M 0 16 h 56" stroke="#e5e5e5" stroke-width="1" fill="none" shape-rendering="crispEdges"/>
                    </pattern>
                </defs>
                <rect width="10000" height="10000" fill="url(#grid-pattern)"/>
            </svg>
            </div>
            <div class="origin-marker" aria-hidden="true" title="Origin (0, 0)"></div>
            <div class="bounding-box" id="bounding-box"><span class="bounding-box-size" aria-hidden="true"></span></div>
        </div>
        </div>
    </div>

    <div class="delete-zone" id="delete-zone">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
        </svg>
        <span>Drop to delete</span>
    </div>

    </div>
</main>

<aside class="fit-mobile-dock" role="toolbar" aria-label="Fit touch controls">
    <div class="source-square" id="source" title="Drag to board to add a square">
        <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
        </svg>
    </div>
    <button type="button" class="bar-btn bar-btn-submit" id="submit-btn" disabled>Submit</button>
</aside>
</div>

<div class="ghost-square" id="ghost"></div>

<div class="fit-toast" id="fit-toast" role="status" aria-live="polite" hidden>
    <span class="fit-toast-icon" id="fit-toast-icon"></span>
    <span class="fit-toast-msg" id="fit-toast-msg"></span>
</div>
{% endblock %}

{% block script %}
<script>
window.FIT_MOBILE = true;
window.FIT_OPTIMAL_N = new Set({{ optimal_n | tojson }});
window.FIT_USER_LOGGED_IN = {{ 'true' if current_user_id else 'false' }};
</script>
<script src="{{ url_for('fit.static', filename='scripts/fit-constants.js') }}"></script>
<script src="{{ url_for('fit.static', filename='scripts/fit-geometry.js') }}"></script>
<script src="{{ url_for('fit.static', filename='scripts/fit-transform.js') }}"></script>
<script src="{{ url_for('fit.static', filename='scripts/fit-squares.js') }}"></script>
<script src="{{ url_for('fit.static', filename='scripts/fit-square-data.js') }}"></script>
<script src="{{ url_for('fit.static', filename='scripts/fit-input.js') }}"></script>
<script src="{{ url_for('fit.static', filename='scripts/fit-main.js') }}"></script>
{% endblock %}
